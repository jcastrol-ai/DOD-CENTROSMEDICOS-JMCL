<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Centros Médicos SCTR – Luz del Sur</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;font-family:"Segoe UI",Arial,sans-serif;background:#f0f4f8;}
#app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;overflow:hidden;}

/* HEADER */
header{background:linear-gradient(135deg,#003580 0%,#0057b8 60%,#f5a623 100%);color:white;padding:8px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 3px 10px rgba(0,0,0,.3);flex-shrink:0;z-index:20;}
.logo{height:38px;width:auto;flex-shrink:0;filter:drop-shadow(0 1px 3px rgba(0,0,0,.3));}
.header-text{flex:1;min-width:0;}
header h1{font-size:1rem;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
header p{font-size:.65rem;opacity:.88;margin-top:2px;}
.header-dept{font-size:.68rem;font-weight:600;opacity:.9;border-left:2px solid rgba(255,255,255,.35);padding-left:8px;line-height:1.35;flex-shrink:0;}

/* FILTROS ZONA */
#leyenda{background:white;padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px 8px;align-items:center;border-bottom:2px solid #dde3ea;flex-shrink:0;box-shadow:0 2px 4px rgba(0,0,0,.06);}
.ley-label,.esp-label{font-size:.65rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.8px;}
.ley-item{display:flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;color:#333;cursor:pointer;padding:4px 9px;border-radius:20px;border:2px solid transparent;transition:all .15s;user-select:none;min-height:30px;}
.ley-item.off{opacity:.3;}
.dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(0,0,0,.15);flex-shrink:0;}
#btn-todos{margin-left:auto;background:#003580;color:white;border:none;padding:5px 11px;border-radius:20px;font-size:.7rem;font-weight:600;cursor:pointer;min-height:30px;}

/* FILTROS ESPECIALIDAD */
#especialidades{background:#f5f7fa;padding:5px 10px;display:flex;flex-wrap:wrap;gap:4px 6px;align-items:center;border-bottom:2px solid #dde3ea;flex-shrink:0;}
.esp-item{font-size:.68rem;font-weight:700;cursor:pointer;padding:4px 10px;border-radius:20px;border:2px solid transparent;transition:all .15s;user-select:none;color:white;min-height:30px;display:flex;align-items:center;}
.esp-item.off{opacity:.3;filter:grayscale(.6);}

/* LAYOUT PRINCIPAL - desktop: fila, móvil vertical: columna */
#main{display:flex;flex:1;overflow:hidden;position:relative;min-height:0;}

/* LISTA LATERAL (desktop) y LISTA INFERIOR (móvil vertical) */
#lista{
  width:280px;
  background:white;
  overflow-y:auto;
  border-right:1px solid #dde3ea;
  flex-shrink:0;
}
.lista-seccion{
  padding:6px 10px 3px;font-size:.6rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;
  background:#f8f9fa;border-bottom:1px solid #eee;
  border-top:1px solid #eee;position:sticky;top:0;z-index:2;
}
.lista-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:8px 10px;border-bottom:1px solid #f0f0f0;
  cursor:pointer;transition:background .15s;
}
.lista-item:hover,.lista-item:active{background:#f0f5ff;}
.lista-item.activo{background:#e8efff;}
.item-pin{
  width:22px;height:22px;border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 4px rgba(0,0,0,.2);
}
.item-pin span{transform:rotate(45deg);color:white;font-size:9px;font-weight:bold;}
.item-info{flex:1;min-width:0;}
.item-nombre{
  font-size:.74rem;font-weight:600;color:#222;
  line-height:1.25;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.item-dir{font-size:.63rem;color:#777;margin-top:2px;line-height:1.3;}
.item-tel{font-size:.63rem;color:#0057b8;margin-top:2px;font-weight:500;}

/* MAPA */
#mapa-wrap{flex:1;display:flex;flex-direction:column;position:relative;min-width:0;}
#map{width:100%;flex:1;min-height:0;}
#contador{
  position:absolute;top:8px;right:8px;background:white;
  padding:4px 10px;border-radius:20px;font-size:.7rem;
  font-weight:600;color:#333;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:5;
}

/* PANEL DETALLE - fixed para que siempre flote sobre todo */
#detalle{
  display:none;position:fixed;bottom:16px;
  left:50%;transform:translateX(-50%);
  background:white;border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  width:92%;max-width:360px;overflow:hidden;
  z-index:99999;animation:slideUp .2s ease;
}
@keyframes slideUp{
  from{transform:translateX(-50%) translateY(24px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}
.det-header{padding:10px 14px 8px;color:white;position:relative;}
.det-tipo{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.85;}
.det-nombre{font-size:.9rem;font-weight:700;line-height:1.25;margin-top:2px;padding-right:26px;}
.det-body{padding:9px 14px 5px;}
.det-row{display:flex;align-items:flex-start;gap:6px;font-size:.73rem;color:#444;margin-bottom:5px;line-height:1.4;}
.det-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.det-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.det-tag{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:10px;color:white;text-transform:uppercase;}
.det-btn{
  display:block;margin:8px 14px 12px;background:#003580;color:white;
  border:none;padding:9px 0;border-radius:8px;font-size:.78rem;
  font-weight:600;cursor:pointer;text-align:center;
  text-decoration:none;width:calc(100% - 28px);
}
.det-btn:hover{background:#0057b8;}
#det-cerrar{
  position:absolute;top:8px;right:8px;
  background:rgba(255,255,255,.25);border:none;color:white;
  border-radius:50%;width:24px;height:24px;font-size:15px;
  cursor:pointer;line-height:1;
}

/* Ocultar botón flotante y modal — no se usan en el nuevo layout */
#btn-lista-movil{display:none !important;}
#lista-modal{display:none !important;}

/* ── MÓVIL VERTICAL (portrait) ──────────────────────────── */
@media (max-width:767px) and (orientation:portrait){
  header h1{font-size:.85rem;}
  header p{font-size:.6rem;}
  .header-dept{display:none;}
  .esp-item,.ley-item{font-size:.65rem;padding:3px 7px;}

  /* Apilar mapa + lista en columna */
  #main{flex-direction:column;}

  /* Mapa ocupa 45% de la altura disponible */
  #mapa-wrap{
    flex:0 0 45%;
    min-height:0;
    border-bottom:2px solid #dde3ea;
  }

  /* Lista-wrap ocupa el resto en portrait */
  #lista-wrap{
    width:100% !important;
  }
  #lista{
    width:100% !important;
    flex:1;
    border-right:none;
    border-top:none;
    overflow-y:auto;
    display:block !important;
  }

  /* Detalle sube un poco para no tapar nada */
  #detalle{bottom:12px;width:96%;}

  /* Secciones de la lista más compactas */
  .lista-seccion{padding:5px 10px 3px;font-size:.58rem;}
  .lista-item{padding:7px 10px;}
  .item-nombre{font-size:.72rem;}
  .item-dir{font-size:.61rem;}
  .item-tel{font-size:.61rem;}
}

/* ── MÓVIL HORIZONTAL (landscape) ──────────────────────── */
@media (max-width:900px) and (orientation:landscape){
  header h1{font-size:.85rem;}
  header p{font-size:.6rem;}
  .header-dept{display:none;}
  .esp-item,.ley-item{font-size:.65rem;padding:3px 7px;}

  /* Fila: lista a la izquierda, mapa a la derecha */
  #main{flex-direction:row;}
  #lista-wrap{width:240px !important;} #lista{display:block !important;}
  #mapa-wrap{flex:1;}
}

/* ── DESKTOP ─────────────────────────────────────────────── */
@media (min-width:768px) and (orientation:landscape),
       (min-width:901px){
  #lista{width:280px;display:block;}
}

/* Pantallas muy pequeñas */
@media(max-width:380px){
  .ley-label,.esp-label{display:none;}
  #btn-todos{padding:4px 8px;font-size:.63rem;}
  .esp-item,.ley-item{font-size:.61rem;padding:3px 6px;}
}

/* ── BOTONES TOGGLE ─────────────────────────────────── */
.toggle-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:#003580;color:white;
  padding:4px 10px;flex-shrink:0;
  font-size:.68rem;font-weight:700;letter-spacing:.4px;
  user-select:none;cursor:default;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.toggle-bar .toggle-grupo{
  display:flex;align-items:center;gap:8px;
}
.toggle-btn{
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);
  color:white;border-radius:6px;padding:3px 10px;
  font-size:.67rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:5px;
  transition:background .15s;white-space:nowrap;
  -webkit-appearance:none;appearance:none;
}
.toggle-btn:hover{background:rgba(255,255,255,.28);}
.toggle-btn .arrow{
  display:inline-block;transition:transform .25s;font-size:.7rem;
}
.toggle-btn.collapsed .arrow{transform:rotate(-90deg);}

/* Contenedor colapsable con transición suave */
.colapsable{
  overflow:hidden;
  transition:max-height .3s ease, opacity .3s ease;
  max-height:200px;
  opacity:1;
}
.colapsable.oculto{
  max-height:0 !important;
  opacity:0;
}

/* Lista-wrap colapsable */
#lista-wrap{
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition:max-height .3s ease, opacity .3s ease, width .3s ease, flex .3s ease;
}
/* Desktop/landscape: ancho fijo */
@media(min-width:768px),(orientation:landscape){
  #lista-wrap{
    width:280px;
    flex-shrink:0;
    max-height:9999px;
  }
  #lista-wrap.oculto{
    width:0 !important;
    flex-shrink:1 !important;
    opacity:0;
  }
}
/* Portrait móvil: altura variable */
@media(max-width:767px) and (orientation:portrait){
  #lista-wrap{
    width:100%;
    flex:1;
    max-height:9999px;
    opacity:1;
  }
  #lista-wrap.oculto{
    flex:0 0 0px !important;
    max-height:0 !important;
    opacity:0;
  }
}
</style>
</head>

// ── ESTADO ───────────────────────────────────────────────────────────────────
const filtros={"zona-centro":true,"zona-este":true,"zona-sur":true,"essalud":true,"minsa":true};
const filtrosEsp={"Urgencias":true,"Neurología":true,"Quemaduras":true,"Traumatología":true,"ESSALUD":true,"MINSA":true};

function centroVisible(c){
  return filtros[c.cat] && c.tags.some(t=>filtrosEsp[t]===true);
}

// ── MAPA con Google Maps JS API sin key (modo embed estático de marcadores) ──
// Usamos Leaflet desde CDN confiable. Si falla, fallback a iframe.
let map=null, marcadores=[];

function initMap(){
  // Leaflet cargado inline para evitar dependencias externas
  if(typeof L === "undefined"){ initFallback(); return; }

  map = L.map("map",{zoomControl:true}).setView([-12.08,-77.02],11);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    attribution:"© OpenStreetMap",maxZoom:19
  }).addTo(map);

  // Crear marcadores SVG coloreados
  centros.forEach((c,i)=>{
    const color = COLORES[c.cat];
    const svgIcon = L.divIcon({
      className:"",
      html:`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
        <path d="M14 1C7.373 1 2 6.373 2 13c0 9 12 24 12 24S26 22 26 13C26 6.373 20.627 1 14 1z"
          fill="${color}" stroke="white" stroke-width="1.5"/>
        <circle cx="14" cy="13" r="6" fill="white" opacity=".92"/>
        <text x="14" y="17" font-size="8" font-weight="bold" text-anchor="middle"
          fill="${color}" font-family="Arial">✚</text>
      </svg>`,
      iconSize:[28,38], iconAnchor:[14,38], popupAnchor:[0,-40]
    });

    const marker = L.marker([c.lat,c.lng],{icon:svgIcon})
      .bindPopup(`<div style="font-family:Arial;min-width:180px">
        <div style="background:${color};color:white;padding:7px 10px;margin:-13px -20px 8px;border-radius:6px 6px 0 0">
          <div style="font-size:10px;opacity:.85;text-transform:uppercase;letter-spacing:1px">${LABELS[c.cat]}</div>
          <div style="font-size:13px;font-weight:700;margin-top:2px">${c.nombre}</div>
        </div>
        <div style="font-size:11px;color:#555;margin-bottom:4px">📍 ${c.dir}</div>
        <div style="font-size:11px;color:#0057b8;font-weight:600">📞 ${c.tel}</div>
        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.nombre+' '+c.dir)}"
          target="_blank"
          style="display:block;margin-top:8px;background:#003580;color:white;text-align:center;padding:5px;border-radius:5px;font-size:11px;font-weight:700;text-decoration:none">
          Ver en Google Maps
        </a>
      </div>`,{maxWidth:240})
      .on("click",()=>seleccionar(i));

    marcadores.push({marker,cat:c.cat,tags:c.tags,visible:true});
    marker.addTo(map);
  });

  actualizarMarcadores();
}

function initFallback(){
  // Si Leaflet no carga, usar iframe básico
  const wrap=document.getElementById("mapa-wrap");
  const mapDiv=document.getElementById("map");
  const iframe=document.createElement("iframe");
  iframe.src="https://maps.google.com/maps?q=-12.08,-77.02&z=11&output=embed";
  iframe.style.cssText="width:100%;height:100%;border:none;flex:1;";
  mapDiv.style.display="none";
  wrap.appendChild(iframe);
}

// ── ACTUALIZAR MARCADORES Y ZOOM ─────────────────────────────────────────────
function actualizarMarcadores(){
  if(!map) return;
  const bounds = L.latLngBounds();
  let hayVisibles = false;

  centros.forEach((c,i)=>{
    const m = marcadores[i];
    if(!m) return;
    const visible = centroVisible(c);
    if(visible){
      m.marker.addTo(map);
      bounds.extend([c.lat,c.lng]);
      hayVisibles = true;
    } else {
      map.removeLayer(m.marker);
    }
  });

  // Ajustar zoom para mostrar todos los visibles
  if(hayVisibles){
    map.fitBounds(bounds, {padding:[40,40], maxZoom:15, animate:true});
  }
}

// ── SELECCIONAR CLÍNICA ───────────────────────────────────────────────────────
function seleccionar(i){
  const c = centros[i];
  document.querySelectorAll(".lista-item").forEach(el=>el.classList.remove("activo"));
  document.querySelectorAll(`.lista-item[data-i="${i}"]`).forEach(el=>{
    el.classList.add("activo");
    el.scrollIntoView({block:"nearest"});
  });

  // Centrar y zoom en el marcador seleccionado
  if(map){
    map.setView([c.lat,c.lng],16,{animate:true});
    marcadores[i].marker.openPopup();
  }

  // Panel detalle
  const color=COLORES[c.cat];
  document.getElementById("det-header").style.background=color;
  document.getElementById("det-tipo").textContent=LABELS[c.cat];
  document.getElementById("det-nombre").textContent=c.nombre;
  document.getElementById("det-dir").textContent=c.dir;
  document.getElementById("det-tel").textContent=c.tel;
  document.getElementById("det-tags").innerHTML=c.tags.map(t=>`<span class="det-tag" style="background:${color}">${t}</span>`).join("");
  document.getElementById("det-gmaps").href=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.nombre+" "+c.dir)}`;
  document.getElementById("detalle").style.display="block";

}

document.getElementById("det-cerrar").addEventListener("click",()=>{
  document.getElementById("detalle").style.display="none";
  document.querySelectorAll(".lista-item").forEach(el=>el.classList.remove("activo"));
  // Volver a mostrar todos los visibles
  actualizarMarcadores();
});

// ── LISTA ────────────────────────────────────────────────────────────────────
function construirLista(){
  const listaEl = document.getElementById("lista");
  listaEl.innerHTML = "";
  const grupos = {};
  centros.forEach((c,i)=>{
    if(!centroVisible(c)) return;
    if(!grupos[c.cat]) grupos[c.cat]=[];
    grupos[c.cat].push({...c,i});
  });
  Object.keys(LABELS).forEach(cat=>{
    if(!grupos[cat]||!grupos[cat].length) return;
    const color = COLORES[cat];
    const sec = document.createElement("div");
    sec.className = "lista-seccion";
    sec.style.color = color;
    sec.textContent = LABELS[cat]+"  ("+grupos[cat].length+")";
    listaEl.appendChild(sec);
    grupos[cat].forEach(c=>{
      const d = document.createElement("div");
      d.className = "lista-item";
      d.dataset.i = c.i;
      d.innerHTML =
        '<div class="item-pin" style="background:'+COLORES[c.cat]+'"><span>✚</span></div>'+
        '<div class="item-info">'+
          '<div class="item-nombre">'+c.nombre+'</div>'+
          '<div class="item-dir">'+c.dir+'</div>'+
          '<div class="item-tel">📞 '+c.tel+'</div>'+
        '</div>';
      d.addEventListener("click",()=>seleccionar(c.i));
      listaEl.appendChild(d);
    });
  });
  actualizarContador();
  actualizarMarcadores();
}

// ── FILTROS ───────────────────────────────────────────────────────────────────
document.querySelectorAll(".ley-item").forEach(item=>{
  item.addEventListener("click",()=>{
    const cat=item.dataset.cat;
    filtros[cat]=!filtros[cat];
    item.classList.toggle("off",!filtros[cat]);
    construirLista();
  });
});
document.querySelectorAll(".esp-item").forEach(item=>{
  item.addEventListener("click",()=>{
    const esp=item.dataset.esp;
    filtrosEsp[esp]=!filtrosEsp[esp];
    item.classList.toggle("off",!filtrosEsp[esp]);
    construirLista();
  });
});
document.getElementById("btn-todos").addEventListener("click",()=>{
  Object.keys(filtros).forEach(k=>filtros[k]=true);
  Object.keys(filtrosEsp).forEach(k=>filtrosEsp[k]=true);
  document.querySelectorAll(".ley-item").forEach(el=>el.classList.remove("off"));
  document.querySelectorAll(".esp-item").forEach(el=>el.classList.remove("off"));
  construirLista();
});

function actualizarContador(){
  const n = centros.filter(c=>centroVisible(c)).length;
  const el = document.getElementById("contador");
  if(el) el.textContent = n+" centros visibles";
}

// Recalcular mapa al rotar el dispositivo
window.addEventListener("orientationchange",()=>{
  setTimeout(()=>{ if(map) map.invalidateSize(); },350);
});
window.addEventListener("resize",()=>{
  if(map) map.invalidateSize();
});

// ── TOGGLE FILTROS ────────────────────────────────────────────────────────────
let filtrosVisible = true;
function toggleFiltros(){
  filtrosVisible = !filtrosVisible;
  const wrap = document.getElementById("filtros-wrap");
  const btn  = document.getElementById("btn-toggle-filtros");
  wrap.classList.toggle("oculto", !filtrosVisible);
  btn.classList.toggle("collapsed", !filtrosVisible);
  btn.querySelector("span:first-child").textContent = filtrosVisible ? "🔽 Filtros" : "🔼 Filtros";
  setTimeout(()=>{ if(map) map.invalidateSize(); }, 320);
}

// ── TOGGLE LISTA ──────────────────────────────────────────────────────────────
let listaVisible = true;
function toggleLista(){
  listaVisible = !listaVisible;
  const wrap = document.getElementById("lista-wrap");
  const btn  = document.getElementById("btn-toggle-lista");
  wrap.classList.toggle("oculto", !listaVisible);
  btn.classList.toggle("collapsed", !listaVisible);
  btn.querySelector("span:first-child").textContent = listaVisible ? "📋 Lista" : "📋 Lista";
  // Dar tiempo a la animación y recalcular mapa
  setTimeout(()=>{ if(map) map.invalidateSize(); }, 320);
}

// ── CARGAR LEAFLET DINÁMICAMENTE ─────────────────────────────────────────────
(function loadLeaflet(){
  // CSS
  const link=document.createElement("link");
  link.rel="stylesheet";
  link.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";
  document.head.appendChild(link);
  // JS
  const script=document.createElement("script");
  script.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
  script.onload=function(){
    initMap();
    construirLista();
  };
  script.onerror=function(){
    initFallback();
    construirLista();
  };
  document.head.appendChild(script);
})();
</script>
